<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="IronBridge">
  <rect width="96" height="96" rx="20" fill="#0B1220"/>
  <g fill="none" stroke="#5EE6C3" stroke-width="4" stroke-linecap="round">
    <!-- deck -->
    <line x1="14" y1="62" x2="82" y2="62"/>
    <!-- towers -->
    <line x1="34" y1="30" x2="34" y2="62"/>
    <line x1="62" y1="30" x2="62" y2="62"/>
    <!-- suspension cables -->
    <path d="M14 54 C 24 34, 44 34, 48 48 C 52 34, 72 34, 82 54"/>
    <!-- hangers -->
    <line x1="24" y1="47" x2="24" y2="62"/>
    <line x1="48" y1="48" x2="48" y2="62"/>
    <line x1="72" y1="47" x2="72" y2="62"/>
  </g>
  <!-- verify check seal -->
  <circle cx="48" cy="72" r="4" fill="#5EE6C3"/>
</svg>
